<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Aleph dourado — Hermetika">
  <defs>
    <radialGradient id="background" cx="35%" cy="24%" r="88%">
      <stop offset="0" stop-color="#242938"/>
      <stop offset=".58" stop-color="#11141d"/>
      <stop offset="1" stop-color="#05070b"/>
    </radialGradient>
    <linearGradient id="gold" x1="18" y1="12" x2="48" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff0a3"/>
      <stop offset=".43" stop-color="#e1b92f"/>
      <stop offset="1" stop-color="#a87312"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.25" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="16" fill="url(#background)"/>
  <circle cx="32" cy="32" r="25" fill="none" stroke="#d4af37" stroke-width="2" opacity=".78"/>
  <circle cx="32" cy="32" r="21.5" fill="#d4af37" opacity=".045"/>
  <text
    x="32"
    y="47"
    fill="url(#gold)"
    filter="url(#glow)"
    font-family="Noto Serif Hebrew, Times New Roman, serif"
    font-size="43"
